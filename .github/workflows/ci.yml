name : CI pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login in Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/jobguard-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/jobguard-backend:latest

      - name: Build and push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/jobguard-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/jobguard-frontend:latest